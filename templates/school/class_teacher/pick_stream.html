{% extends base_template|default:"school/teacher/base.html" %}
{% block title %}Select Your Class{% endblock %}
{% block content %}
<div class="container-fluid py-4" style="max-width:540px">
  <h6 class="fw-bold mb-3"><i class="bi bi-people me-2 text-success"></i>Select a Class</h6>
  <div class="list-group shadow-sm">
    {% for s in streams %}
    <a href="?stream={{ s.id }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3">
      <div>
        <div class="fw-semibold">{{ s.grade.name }} – {{ s.name }}</div>
        <small class="text-muted">{{ s.student_stream.count }} students</small>
      </div>
      <i class="bi bi-chevron-right text-muted"></i>
    </a>
    {% empty %}
    <div class="list-group-item text-muted text-center py-4">No streams found.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
