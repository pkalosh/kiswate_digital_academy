{% extends 'school/base.html' %}
{% block title %}New Announcement{% endblock %}

{% block content %}
<div class="container-fluid py-3">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="d-flex align-items-center gap-2 mb-3">
        <a href="{% url 'school:announcements' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <h5 class="fw-bold mb-0">New Announcement</h5>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control" placeholder="Announcement title" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Body <span class="text-danger">*</span></label>
              <textarea name="body" class="form-control" rows="5" placeholder="Write your announcement here..." required></textarea>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Audience</label>
                <select name="audience" class="form-select">
                  {% for val, label in audiences %}
                  <option value="{{ val }}">{{ label }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Grade (optional)</label>
                <select name="grade" class="form-select">
                  <option value="">All Grades</option>
                  {% for g in grades %}
                  <option value="{{ g.pk }}">{{ g.name }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Expires At (optional)</label>
                <input type="datetime-local" name="expires_at" class="form-control">
              </div>
              <div class="col-md-6 d-flex align-items-end">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="is_pinned" id="pinned">
                  <label class="form-check-label fw-semibold" for="pinned">
                    <i class="bi bi-pin-angle-fill text-danger me-1"></i>Pin this announcement
                  </label>
                </div>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success"><i class="bi bi-megaphone me-1"></i>Publish</button>
              <a href="{% url 'school:announcements' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
