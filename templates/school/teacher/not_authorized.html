{% extends 'landing/base.html' %}
{% load static %}
{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="container" style="margin-top: 80px; text-align: center;">
    
    <div style="max-width: 600px; margin: auto; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: #ffffff;">
        
        <img src="{% static 'images/forbidden.png' %}" 
             alt="Access Denied" 
             style="width: 120px; margin-bottom: 20px;">
        
        <h2 style="color: #dc3545; font-weight: 600;">
            🚫 Access Denied
        </h2>
        
        <p style="font-size: 16px; color: #555; margin-top: 15px;">
            You are not authorized to access this page.
        </p>
        
        <p style="font-size: 14px; color: #777;">
            Please contact the system administrator or return to your dashboard.
        </p>
        
        <div style="margin-top: 30px;">
            <a href="{% url 'userauths:sign-out' %}" 
               class="btn btn-primary"
               style="padding: 10px 25px; border-radius: 5px;">
                Sign Out
            </a>
            
            <a href="/" 
               class="btn btn-secondary"
               style="padding: 10px 25px; border-radius: 5px; margin-left: 10px;">
                Back to Home
            </a>
        </div>

    </div>

</div>
{% endblock %}
