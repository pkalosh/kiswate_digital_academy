{% extends 'landing/base.html' %}
{% block title %}Forgot Password | Kiswate{% endblock %}

{% block content %}
<section style="padding:80px 0; background-color:#0d1117;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
          <h2 class="text-light">Forgot Password</h2>
          <p class="text-secondary">Enter your email or phone number to receive OTP</p>
        </div>

        <form method="post" class="p-4 rounded-4 shadow" style="background-color:#1a1f2b;">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label text-light">Email or Phone Number</label>
            <input type="text" name="email" class="form-control" placeholder="you@example.com or 0712345678" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Send OTP</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
