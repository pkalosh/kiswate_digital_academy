{% extends base_template|default:"school/base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:480px">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
             style="width:56px;height:56px;background:#d1fae5;">
          <i class="bi bi-shield-lock" style="font-size:1.5rem;color:#0b7a2a;"></i>
        </div>
        <h5 class="fw-bold mb-1">Change Password</h5>
        <p class="text-muted small mb-0">Enter your current password and choose a new one.</p>
      </div>

      {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show py-2 small">
        {{ message }}<button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold small">Current Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="current_password" name="current_password"
                   class="form-control" placeholder="Your current password" required>
            <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('current_password',this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key"></i></span>
            <input type="password" id="new_password" name="new_password"
                   class="form-control" placeholder="At least 8 characters" required minlength="8"
                   oninput="checkMatch()">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('new_password',this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Confirm New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
            <input type="password" id="confirm_password" name="confirm_password"
                   class="form-control" placeholder="Repeat new password" required
                   oninput="checkMatch()">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('confirm_password',this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div id="match-msg" class="form-text mt-1" style="min-height:18px;"></div>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-success w-100 fw-semibold">
          <i class="bi bi-check-circle me-1"></i>Update Password
        </button>

        <div class="text-center mt-3">
          <a href="javascript:history.back()" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Go back
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function toggleVis(id, btn) {
  const el = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (el.type === 'password') {
    el.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    el.type = 'password';
    icon.className = 'bi bi-eye';
  }
}

function checkMatch() {
  const np = document.getElementById('new_password').value;
  const cp = document.getElementById('confirm_password').value;
  const msg = document.getElementById('match-msg');
  const btn = document.getElementById('submit-btn');
  if (!cp) { msg.textContent = ''; btn.disabled = false; return; }
  if (np === cp) {
    msg.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>Passwords match</span>';
    btn.disabled = false;
  } else {
    msg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>Passwords do not match</span>';
    btn.disabled = true;
  }
}
</script>
{% endblock %}
